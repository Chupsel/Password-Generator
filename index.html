<!DOCTYPE html>
<html lang="en">
<head>
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>Password Generator</h1>

    <input id="password" readonly placeholder="Click generate...">

    <label>
      Length:
      <span id="lengthValue">16</span>
    </label>

    <input id="length" type="range" min="6" max="64" value="16">

    <label><input id="uppercase" type="checkbox" checked> Uppercase</label>
    <label><input id="lowercase" type="checkbox" checked> Lowercase</label>
    <label><input id="numbers" type="checkbox" checked> Numbers</label>
    <label><input id="symbols" type="checkbox" checked> Symbols</label>

    <button onclick="generatePassword()">Generate</button>
    <button onclick="copyPassword()">Copy</button>

    <p id="message"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
